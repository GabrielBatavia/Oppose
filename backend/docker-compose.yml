services:
  postgres:
    image: postgres:16-alpine
    container_name: oppose_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oppose
      POSTGRES_PASSWORD: oppose_dev_password
      POSTGRES_DB: oppose_dev
    ports:
      - "5432:5432"
    volumes:
      - oppose_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oppose -d oppose_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  oppose_postgres_data:
